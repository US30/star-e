version: '3.8'

services:
  api:
    build: .
    container_name: star-e-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - STAR_E_DATA_DIR=/app/data
      - MLFLOW_TRACKING_URI=/app/mlruns
    command: uvicorn star_e.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    container_name: star-e-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./dashboard:/app/dashboard
    environment:
      - STAR_E_DATA_DIR=/app/data
      - API_URL=http://api:8000
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: star-e-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    restart: unless-stopped

volumes:
  data:
  mlruns:
